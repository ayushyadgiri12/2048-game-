<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2048 Clone with Leaderboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #faf8ef; color: #776e65; }

    nav {
      background: #bbada0; padding: 14px 30px;
      display: flex; justify-content: space-between; align-items: center;
    }
    nav .logo { font-size: 24px; font-weight: 900; color: #f9f6f2; letter-spacing: 2px; }
    nav ul { list-style: none; display: flex; gap: 20px; }
    nav ul li a {
      color: #f9f6f2; text-decoration: none; font-weight: 600;
      padding: 6px 14px; border-radius: 6px; transition: background 0.2s;
      cursor: pointer;
    }
    nav ul li a:hover, nav ul li a.active { background: #8f7a66; }

    section { display: none; padding: 40px 20px; max-width: 700px; margin: 0 auto; }
    section.active { display: block; }

    #home { text-align: center; padding-top: 80px; }
    #home h1 { font-size: 64px; font-weight: 900; color: #776e65; margin-bottom: 10px; }
    #home p  { font-size: 18px; margin-bottom: 30px; color: #a09080; }
    #home .btn-play {
      background: #8f7a66; color: #f9f6f2; border: none;
      padding: 14px 40px; font-size: 20px; border-radius: 8px;
      cursor: pointer; font-weight: 700; transition: background 0.2s;
    }
    #home .btn-play:hover { background: #776e65; }

    #play { max-width: 520px; }
    .game-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px;
    }
    .game-title { font-size: 48px; font-weight: 900; color: #776e65; }
    .score-area { display: flex; gap: 10px; }
    .score-box {
      background: #bbada0; border-radius: 6px;
      padding: 8px 18px; text-align: center; color: #f9f6f2; min-width: 80px;
    }
    .score-box .label { font-size: 11px; font-weight: 700; letter-spacing: 1px; }
    .score-box .value { font-size: 22px; font-weight: 900; }
    .game-controls { display: flex; gap: 10px; margin-bottom: 16px; }
    .btn {
      background: #8f7a66; color: #f9f6f2; border: none;
      padding: 10px 20px; border-radius: 6px; cursor: pointer;
      font-weight: 700; font-size: 14px; transition: background 0.2s;
    }
    .btn:hover { background: #776e65; }
    .btn-save { background: #5a8a5a; }
    .btn-save:hover { background: #4a7a4a; }

    .grid-container {
      background: #bbada0; border-radius: 10px;
      padding: 12px; display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px; width: 100%;
    }
    .cell {
      background: #cdc1b4; border-radius: 6px;
      aspect-ratio: 1; display: flex;
      align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900; color: #776e65;
      transition: all 0.1s ease;
    }
    .cell[data-val="2"]    { background:#eee4da; color:#776e65; }
    .cell[data-val="4"]    { background:#ede0c8; color:#776e65; }
    .cell[data-val="8"]    { background:#f2b179; color:#f9f6f2; }
    .cell[data-val="16"]   { background:#f59563; color:#f9f6f2; }
    .cell[data-val="32"]   { background:#f67c5f; color:#f9f6f2; }
    .cell[data-val="64"]   { background:#f65e3b; color:#f9f6f2; }
    .cell[data-val="128"]  { background:#edcf72; color:#f9f6f2; font-size:22px; }
    .cell[data-val="256"]  { background:#edcc61; color:#f9f6f2; font-size:22px; }
    .cell[data-val="512"]  { background:#edc850; color:#f9f6f2; font-size:22px; }
    .cell[data-val="1024"] { background:#edc53f; color:#f9f6f2; font-size:18px; }
    .cell[data-val="2048"] { background:#edc22e; color:#f9f6f2; font-size:18px; }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 100;
      align-items: center; justify-content: center;
    }
    .overlay.show { display: flex; }
    .overlay-box {
      background: #faf8ef; border-radius: 12px;
      padding: 40px 50px; text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3); min-width: 300px;
    }
    .overlay-box h2 { font-size: 36px; color: #776e65; margin-bottom: 10px; }
    .overlay-box p  { font-size: 18px; color: #a09080; margin-bottom: 16px; }
    .overlay-box .final-score {
      font-size: 48px; font-weight: 900;
      color: #f65e3b; margin: 10px 0 20px;
    }
    .overlay-box input {
      padding: 10px 16px; font-size: 16px;
      border: 2px solid #bbada0; border-radius: 6px;
      width: 100%; margin-bottom: 14px; outline: none;
    }
    .overlay-box input:focus { border-color: #8f7a66; }
    .overlay-box .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    #leaderboard h2 { font-size: 32px; font-weight: 900; color: #776e65; margin-bottom: 24px; }
    #leaderboard table {
      width: 100%; border-collapse: collapse;
      background: #fff; border-radius: 10px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    #leaderboard th {
      background: #bbada0; color: #f9f6f2;
      padding: 14px; text-align: center; font-size: 13px; letter-spacing: 1px;
    }
    #leaderboard td {
      padding: 12px 16px; text-align: center;
      border-bottom: 1px solid #eee; font-size: 15px;
    }
    #leaderboard tr:nth-child(even) td { background: #faf8ef; }
    #leaderboard tr:hover td { background: #f0ebe5; }
    .rank-1 td:first-child { font-size: 20px; }
    .rank-2 td:first-child { font-size: 18px; }
    .rank-3 td:first-child { font-size: 16px; }
    .empty-msg { text-align: center; color: #a09080; padding: 40px; font-size: 16px; }
    #leaderboard .lb-controls { display: flex; gap: 10px; margin-bottom: 16px; }

    #forum h2 { font-size: 32px; font-weight: 900; color: #776e65; margin-bottom: 24px; }
    .forum-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
    .forum-form input, .forum-form textarea {
      padding: 10px 14px; border: 2px solid #bbada0;
      border-radius: 6px; font-size: 14px; outline: none; font-family: inherit;
    }
    .forum-form input:focus, .forum-form textarea:focus { border-color: #8f7a66; }
    .forum-form textarea { resize: vertical; min-height: 90px; }
    .comment-card {
      background: #fff; border-radius: 8px;
      padding: 16px 20px; margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      border-left: 4px solid #8f7a66;
    }
    .comment-card .author { font-weight: 700; color: #776e65; font-size: 14px; }
    .comment-card .time   { color: #bbada0; font-size: 12px; margin-left: 8px; }
    .comment-card .text   { margin-top: 6px; font-size: 15px; color: #555; }
    .no-comments { color: #a09080; text-align: center; padding: 30px; }
  </style>
</head>
<body>

<nav>
  <div class="logo">2048</div>
  <ul>
    <li><a class="nav-link active" data-target="home">Home</a></li>
    <li><a class="nav-link" data-target="play">Play</a></li>
    <li><a class="nav-link" data-target="leaderboard">Leaderboard</a></li>
    <li><a class="nav-link" data-target="forum">Forum</a></li>
  </ul>
</nav>

<section id="home" class="active">
  <h1>2048</h1>
  <p>Merge tiles. Reach 2048. Beat the leaderboard.</p>
  <button class="btn-play" id="btn-start">Play Now</button>
</section>

<section id="play">
  <div class="game-header">
    <div class="game-title">2048</div>
    <div class="score-area">
      <div class="score-box">
        <div class="label">SCORE</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">BEST</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
  </div>
  <div class="game-controls">
    <button class="btn" id="btn-new">New Game</button>
    <button class="btn btn-save" id="btn-save">Save Score</button>
  </div>
  <div class="grid-container" id="grid"></div>
</section>

<section id="leaderboard">
  <h2>🏆 Leaderboard</h2>
  <div class="lb-controls">
    <button class="btn" id="btn-refresh">Refresh</button>
    <button class="btn" id="btn-clear" style="background:#c0392b">Clear All</button>
  </div>
  <table>
    <thead>
      <tr><th>RANK</th><th>PLAYER</th><th>SCORE</th><th>DATE</th></tr>
    </thead>
    <tbody id="lb-body"></tbody>
  </table>
</section>

<section id="forum">
  <h2>💬 Strategy Forum</h2>
  <div class="forum-form">
    <input type="text" id="forum-name" placeholder="Your name" maxlength="30" />
    <textarea id="forum-text" placeholder="Share your strategy or comment..."></textarea>
    <button class="btn" id="btn-post">Post Comment</button>
  </div>
  <div id="comments-list"></div>
</section>

<!-- Game Over Overlay -->
<div class="overlay" id="overlay-gameover">
  <div class="overlay-box">
    <h2>Game Over!</h2>
    <p>No more moves available.</p>
    <div class="final-score" id="go-score">0</div>
    <input type="text" id="go-name" placeholder="Enter your name" maxlength="20" />
    <div class="btn-group">
      <button class="btn btn-save" id="go-save">Save Score</button>
      <button class="btn" id="go-retry">Try Again</button>
    </div>
  </div>
</div>

<!-- Win Overlay -->
<div class="overlay" id="overlay-win">
  <div class="overlay-box">
    <h2>You Win! 🎉</h2>
    <p>You reached the 2048 tile!</p>
    <div class="final-score" id="win-score">0</div>
    <input type="text" id="win-name" placeholder="Enter your name" maxlength="20" />
    <div class="btn-group">
      <button class="btn btn-save" id="win-save">Save Score</button>
      <button class="btn" id="win-continue">Continue</button>
      <button class="btn" id="win-new">New Game</button>
    </div>
  </div>
</div>

<!-- Save Overlay -->
<div class="overlay" id="overlay-save">
  <div class="overlay-box">
    <h2>Save Score</h2>
    <p>Current score:</p>
    <div class="final-score" id="save-score">0</div>
    <input type="text" id="save-name" placeholder="Enter your name" maxlength="20" />
    <div class="btn-group">
      <button class="btn btn-save" id="save-confirm">Save</button>
      <button class="btn" id="save-cancel">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── Navigation ──────────────────────────────────────
function showSection(id) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelector('[data-target="' + id + '"]').classList.add('active');
  if (id === 'leaderboard') renderLeaderboard();
  if (id === 'forum') renderComments();
}

document.querySelectorAll('.nav-link').forEach(function(link) {
  link.addEventListener('click', function() {
    showSection(this.getAttribute('data-target'));
  });
});

document.getElementById('btn-start').addEventListener('click', function() {
  showSection('play');
});

// ── Game State ──────────────────────────────────────
var board = [];
var score = 0;
var best  = parseInt(localStorage.getItem('2048-best') || '0');
var gameWon = false;

function initGame() {
  board = Array(16).fill(0);
  score = 0;
  gameWon = false;
  addRandomTile();
  addRandomTile();
  render();
  updateScores();
}

// ── Render ──────────────────────────────────────────
function render() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  board.forEach(function(val) {
    var cell = document.createElement('div');
    cell.className = 'cell';
    if (val) {
      cell.textContent = val;
      cell.setAttribute('data-val', val > 2048 ? '2048' : String(val));
    }
    grid.appendChild(cell);
  });
}

function updateScores() {
  if (score > best) {
    best = score;
    localStorage.setItem('2048-best', best);
  }
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent  = best;
}

// ── Tile Logic ──────────────────────────────────────
function addRandomTile() {
  var empty = [];
  board.forEach(function(v, i) { if (v === 0) empty.push(i); });
  if (!empty.length) return;
  var idx = empty[Math.floor(Math.random() * empty.length)];
  board[idx] = Math.random() < 0.9 ? 2 : 4;
}

function slideRow(row) {
  var arr = row.filter(function(v) { return v !== 0; });
  for (var i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2;
      score += arr[i];
      arr.splice(i + 1, 1);
    }
  }
  while (arr.length < 4) arr.push(0);
  return arr;
}

function getRow(i)    { return board.slice(i * 4, i * 4 + 4); }
function getCol(j)    { return [0,1,2,3].map(function(r) { return board[r * 4 + j]; }); }
function setRow(i, r) { r.forEach(function(v, j) { board[i * 4 + j] = v; }); }
function setCol(j, c) { c.forEach(function(v, i) { board[i * 4 + j] = v; }); }

function move(dir) {
  var prev = board.slice();
  var i, j;

  if (dir === 'left')  { for(i=0;i<4;i++) setRow(i, slideRow(getRow(i))); }
  if (dir === 'right') { for(i=0;i<4;i++) setRow(i, slideRow(getRow(i).reverse()).reverse()); }
  if (dir === 'up')    { for(j=0;j<4;j++) setCol(j, slideRow(getCol(j))); }
  if (dir === 'down')  { for(j=0;j<4;j++) setCol(j, slideRow(getCol(j).reverse()).reverse()); }

  var changed = board.some(function(v, i) { return v !== prev[i]; });
  if (changed) {
    addRandomTile();
    render();
    updateScores();
    checkState();
  }
}

// ── Win / Game Over ─────────────────────────────────
function checkState() {
  if (!gameWon && board.indexOf(2048) !== -1) {
    gameWon = true;
    document.getElementById('win-score').textContent = score;
    document.getElementById('overlay-win').classList.add('show');
    return;
  }
  if (board.indexOf(0) === -1) {
    var over = true;
    for (var i = 0; i < 4 && over; i++) {
      for (var j = 0; j < 4 && over; j++) {
        var v = board[i*4+j];
        if (j < 3 && v === board[i*4+j+1]) over = false;
        if (i < 3 && v === board[(i+1)*4+j]) over = false;
      }
    }
    if (over) {
      document.getElementById('go-score').textContent = score;
      document.getElementById('overlay-gameover').classList.add('show');
    }
  }
}

// ── Keyboard ────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('play').classList.contains('active')) return;
  var map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// ── Touch / Swipe ───────────────────────────────────
var tx = 0, ty = 0;
document.addEventListener('touchstart', function(e) {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', function(e) {
  if (!document.getElementById('play').classList.contains('active')) return;
  var dx = e.changedTouches[0].clientX - tx;
  var dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
}, { passive: true });

// ── Score Saving ────────────────────────────────────
function saveScore(name) {
  var entries = JSON.parse(localStorage.getItem('2048-scores') || '[]');
  entries.push({ name: name || 'Anonymous', score: score, date: new Date().toLocaleDateString() });
  localStorage.setItem('2048-scores', JSON.stringify(entries));
}

document.getElementById('btn-save').addEventListener('click', function() {
  document.getElementById('save-score').textContent = score;
  document.getElementById('overlay-save').classList.add('show');
});

document.getElementById('save-confirm').addEventListener('click', function() {
  saveScore(document.getElementById('save-name').value.trim());
  document.getElementById('overlay-save').classList.remove('show');
});
document.getElementById('save-cancel').addEventListener('click', function() {
  document.getElementById('overlay-save').classList.remove('show');
});

document.getElementById('go-save').addEventListener('click', function() {
  saveScore(document.getElementById('go-name').value.trim());
  document.getElementById('overlay-gameover').classList.remove('show');
  initGame();
});
document.getElementById('go-retry').addEventListener('click', function() {
  document.getElementById('overlay-gameover').classList.remove('show');
  initGame();
});

document.getElementById('win-save').addEventListener('click', function() {
  saveScore(document.getElementById('win-name').value.trim());
  document.getElementById('overlay-win').classList.remove('show');
});
document.getElementById('win-continue').addEventListener('click', function() {
  document.getElementById('overlay-win').classList.remove('show');
});
document.getElementById('win-new').addEventListener('click', function() {
  document.getElementById('overlay-win').classList.remove('show');
  initGame();
});

// ── New Game button ─────────────────────────────────
document.getElementById('btn-new').addEventListener('click', initGame);

// ── Leaderboard ─────────────────────────────────────
function renderLeaderboard() {
  var entries = JSON.parse(localStorage.getItem('2048-scores') || '[]');
  entries.sort(function(a, b) { return b.score - a.score; });
  var body = document.getElementById('lb-body');
  if (!entries.length) {
    body.innerHTML = '<tr><td colspan="4" class="empty-msg">No scores yet. Play a game!</td></tr>';
    return;
  }
  var medals = ['🥇','🥈','🥉'];
  body.innerHTML = entries.map(function(e, i) {
    return '<tr class="' + (i < 3 ? 'rank-'+(i+1) : '') + '">'
      + '<td>' + (medals[i] || (i+1)) + '</td>'
      + '<td>' + e.name + '</td>'
      + '<td><strong>' + e.score.toLocaleString() + '</strong></td>'
      + '<td>' + e.date + '</td>'
      + '</tr>';
  }).join('');
}

document.getElementById('btn-refresh').addEventListener('click', renderLeaderboard);
document.getElementById('btn-clear').addEventListener('click', function() {
  if (confirm('Clear all leaderboard scores?')) {
    localStorage.removeItem('2048-scores');
    renderLeaderboard();
  }
});

// ── Forum ────────────────────────────────────────────
document.getElementById('btn-post').addEventListener('click', function() {
  var name = document.getElementById('forum-name').value.trim() || 'Anonymous';
  var text = document.getElementById('forum-text').value.trim();
  if (!text) { alert('Please write something first.'); return; }
  var comments = JSON.parse(localStorage.getItem('2048-forum') || '[]');
  comments.unshift({ name: name, text: text, time: new Date().toLocaleString() });
  localStorage.setItem('2048-forum', JSON.stringify(comments));
  document.getElementById('forum-text').value = '';
  renderComments();
});

function renderComments() {
  var comments = JSON.parse(localStorage.getItem('2048-forum') || '[]');
  var list = document.getElementById('comments-list');
  if (!comments.length) {
    list.innerHTML = '<div class="no-comments">No comments yet. Be the first!</div>';
    return;
  }
  list.innerHTML = comments.map(function(c) {
    return '<div class="comment-card">'
      + '<span class="author">' + c.name + '</span>'
      + '<span class="time">' + c.time + '</span>'
      + '<div class="text">' + c.text + '</div>'
      + '</div>';
  }).join('');
}

// ── Start ────────────────────────────────────────────
initGame();
</script>
</body>
</html>
